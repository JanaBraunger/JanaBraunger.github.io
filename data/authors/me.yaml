bio: |
  I am a third-year PhD student in the Velten group at Heidelberg University, developing 
  probabilistic models to study the functional 
  consequences of genetic perturbations in single-cell CRISPR screens. Before starting my PhD, 
  I studied Molecular Biotechnology 
  at Heidelberg University (BSc) and Biomathematics at the University of Greifswald (MSc). During my 
  master’s thesis with Prof. Caroline Uhler at the Broad Institute of MIT and Harvard in Boston, I worked on 
  computational approaches linking 
  transcriptional changes to chromatin reorganization during aging.

